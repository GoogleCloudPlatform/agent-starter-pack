  requires_session: true
  deployment_targets: ["agent_engine", "cloud_run", "none"]
  extra_dependencies: ["google-adk>=1.15.0,<2.0.0", "google-ads>=25.1.0"]
  tags: ["adk", "google-ads", "advertising"]
  frontend_type: "None"
